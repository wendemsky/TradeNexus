server.port=8080
server.error.include-message=always
server.error.include-stacktrace=never

# JWT — issued and validated by Spring Boot; MDS reads JWT_SECRET to verify WS connections
jwt.secret=${JWT_SECRET}

# Market Data Service
mds.url=${MDS_URL:http://localhost:3001}

# Database (PostgreSQL 16)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tradenexus}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:tn_user}
spring.datasource.password=${DB_PASSWORD:}

# JPA — Flyway owns the schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# App defaults
app.initial-balance=${INITIAL_BALANCE:10000}
allowed.origins=http://localhost:4200

# Logging
logging.level.root=warn
logging.level.com.marshals=debug
logging.level.org.springframework.boot.web.embedded.tomcat=info
logging.pattern.console=%-5p %C{0}.%M: %m%n
logging.file.name=target/logs/application.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.total-size-cap=300MB
