<div class="h-full flex flex-col gap-4 p-4 lg:p-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-lg font-semibold text-text-primary">Instruments</h1>
      <p class="text-sm text-text-secondary">Live market prices — click Buy or Sell to place an order</p>
    </div>
    @if (isLoading()) {
      <div class="flex items-center gap-2 text-sm text-text-secondary">
        <div class="w-2 h-2 rounded-full bg-caution animate-pulse"></div>
        Connecting…
      </div>
    } @else {
      <div class="flex items-center gap-2 text-sm text-text-secondary">
        <div class="w-2 h-2 rounded-full bg-positive"></div>
        Live
      </div>
    }
  </div>

  <div class="flex-1 min-h-0">
    <ag-grid-angular
      [class]="themeClass"
      class="w-full h-full"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [getRowId]="getRowId"
      [animateRows]="true"
      [suppressHorizontalScroll]="false"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>

</div>
